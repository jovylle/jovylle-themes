<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jovylle · Bruno Simon</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap">
  <link rel="stylesheet" href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css">
  <link rel="stylesheet" href="bruno.css">
</head>
<body>
  <canvas id="webgl"></canvas>

  <div id="ui">
    <div id="loading">
      <div class="loading-logo">JOVYLLE</div>
      <div class="loading-sub">Loading world…</div>
      <progress id="loading-bar" max="100" value="0"></progress>
    </div>

    <a class="back-link" href="../../index.html">← Gallery</a>

    <div id="hud-buttons">
      <button id="mute-btn" aria-label="Toggle sound"><i class="bx bx-volume-full"></i></button>
      <button id="camera-btn" aria-label="Cycle camera"><i class="bx bx-camera"></i></button>
      <div id="camera-label">chase</div>
    </div>

    <div id="collectible-counter">★ 0 / 0</div>

    <div id="controls-hint">
      <div class="key-group">
        <div class="key">W</div>
        <div class="key-row">
          <div class="key">A</div>
          <div class="key">S</div>
          <div class="key">D</div>
        </div>
      </div>
      <span>Drive</span>
      <div class="key-divider"></div>
      <div class="key">R</div>
      <span>Reset</span>
      <div class="key-divider"></div>
      <div class="key key-wide">Shift</div>
      <span>Boost</span>
      <div class="key-divider"></div>
      <div class="key key-wide">Space</div>
      <span>Drift</span>
      <div class="key-divider"></div>
      <div class="key">C</div>
      <span>Cam</span>
      <div class="key-divider"></div>
      <div class="key">H</div>
      <span>Horn</span>
      <div class="key-divider"></div>
      <div class="key">N</div>
      <span>Time</span>
      <div class="key-divider"></div>
      <div class="key">M</div>
      <span>Mute</span>
    </div>

    <canvas id="minimap" width="150" height="150"></canvas>

    <div id="hud-dials">
      <div id="compass">N 0°</div>
      <div id="speedometer">
        <svg width="92" height="92" viewBox="0 0 92 92">
          <circle class="speedo-track" cx="46" cy="46" r="26"></circle>
          <circle id="speedo-arc" cx="46" cy="46" r="26"></circle>
        </svg>
        <div class="speedo-readout"><span id="speedo-value">0</span><small>km/h</small></div>
      </div>
    </div>

    <div id="speed-fx"></div>

    <div id="intro-prompt">Click or press any key to drive</div>

    <div id="zone-toast"></div>

    <div id="info-panel">
      <button id="info-close" aria-label="Close">✕</button>
      <div id="info-content"></div>
    </div>
  </div>

  <script type="module" src="bruno.js"></script>
</body>
</html>
